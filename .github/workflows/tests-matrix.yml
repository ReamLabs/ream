name: Tests Matrix

on:
  workflow_call:
    inputs:
      network:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  discover-serial-tests:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.discover.outputs.tests }}
      has_tests: ${{ steps.discover.outputs.has_tests }}

    steps:
      - uses: actions/checkout@v4

      - id: discover
        name: Discover serial tests
        run: |
          set -euo pipefail

          mapfile -t serial_tests < <(.github/scripts/serial-tests.sh)
          ci_serial_tests=()
          for test_name in "${serial_tests[@]}"; do
            case "${test_name}" in
              test_lean_node_runs_10_seconds_without_panicking)
                ci_serial_tests+=("${test_name}")
                ;;
              test_lean_node_syncs_and_finalizes_two_nodes)
                echo "::notice::Skipping ${test_name} in the generic matrix; covered by pr-vs-known-commit."
                ;;
              test_lean_node_syncs_and_finalizes_late_joiner|test_lean_node_checkpoint_sync_from_running_node|test_lean_node_checkpoint_sync_from_fresh_source|test_lean_node_checkpoint_sync_restart_existing_node|test_lean_node_checkpoint_sync_from_existing_data_dir)
                if [ "${{ inputs.network }}" = "devnet5" ]; then
                  ci_serial_tests+=("${test_name}")
                else
                  echo "::notice::Skipping flaky local-network serial test in the generic matrix: ${test_name}"
                fi
                ;;
              *)
                ci_serial_tests+=("${test_name}")
                ;;
            esac
          done
          serial_tests=("${ci_serial_tests[@]}")

          if [ "${#serial_tests[@]}" -eq 0 ]; then
            echo 'tests=["__no_serial_tests__"]' >> "$GITHUB_OUTPUT"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tests_json="$(printf '%s\n' "${serial_tests[@]}" | jq -R . | jq -s -c .)"
          echo "tests=${tests_json}" >> "$GITHUB_OUTPUT"
          echo "has_tests=true" >> "$GITHUB_OUTPUT"

  test-parallel:
    name: parallel
    runs-on: ubuntu-latest
    needs: [discover-serial-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test Parallel
        run: |
          set -euo pipefail

          mapfile -t serial_tests < <(.github/scripts/serial-tests.sh)
          skip_args=()
          for test_name in "${serial_tests[@]}"; do
            skip_args+=(--skip "$test_name")
          done

          case "${{ inputs.network }}" in
            devnet4)
              cargo test --release --workspace -- --nocapture "${skip_args[@]}"
              ;;
            devnet5)
              cargo test --workspace --no-default-features --features devnet5 -- --nocapture "${skip_args[@]}"
              ;;
            *)
              echo "Unknown network: ${{ inputs.network }}" >&2
              exit 1
              ;;
          esac

  test-serial:
    name: serial (${{ matrix.test_name }})
    if: ${{ needs.discover-serial-tests.outputs.has_tests == 'true' }}
    runs-on: ubuntu-latest
    needs: [discover-serial-tests]
    strategy:
      fail-fast: false
      matrix:
        test_name: ${{ fromJson(needs.discover-serial-tests.outputs.tests) }}

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test Serial
        run: |
          case "${{ inputs.network }}" in
            devnet4)
              cargo test \
                --release \
                --package ream \
                --bin ream \
                tests::${{ matrix.test_name }} \
                -- --exact --nocapture
              ;;
            devnet5)
              cargo test \
                --package ream \
                --bin ream \
                tests::${{ matrix.test_name }} \
                --no-default-features \
                --features devnet5 \
                -- --exact --nocapture
              ;;
            *)
              echo "Unknown network: ${{ inputs.network }}" >&2
              exit 1
              ;;
          esac
