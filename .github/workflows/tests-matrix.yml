name: Tests Matrix

on:
  workflow_call:
    inputs:
      network:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  discover-serial-tests:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.discover.outputs.tests }}
      has_tests: ${{ steps.discover.outputs.has_tests }}

    steps:
      - uses: actions/checkout@v4

      - id: discover
        name: Discover serial tests
        run: |
          set -euo pipefail

          mapfile -t serial_tests < <(.github/scripts/serial-tests.sh)
          if [ "${#serial_tests[@]}" -eq 0 ]; then
            echo 'tests=["__no_serial_tests__"]' >> "$GITHUB_OUTPUT"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tests_json="$(printf '%s\n' "${serial_tests[@]}" | jq -R . | jq -s -c .)"
          echo "tests=${tests_json}" >> "$GITHUB_OUTPUT"
          echo "has_tests=true" >> "$GITHUB_OUTPUT"

  test-parallel:
    name: parallel
    runs-on: ubuntu-latest
    needs: [discover-serial-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test Parallel
        run: |
          set -euo pipefail

          mapfile -t serial_tests < <(.github/scripts/serial-tests.sh)
          skip_args=()
          for test_name in "${serial_tests[@]}"; do
            skip_args+=(--skip "$test_name")
          done

          if [ "${{ inputs.network }}" = "default" ]; then
            cargo test --release --workspace -- --nocapture "${skip_args[@]}"
          else
            cargo test --workspace --no-default-features --features "${{ inputs.network }}" -- --nocapture "${skip_args[@]}"
          fi

  test-serial:
    name: serial (${{ matrix.test_name }})
    if: ${{ needs.discover-serial-tests.outputs.has_tests == 'true' }}
    runs-on: ubuntu-latest
    needs: [discover-serial-tests]
    strategy:
      fail-fast: false
      matrix:
        test_name: ${{ fromJson(needs.discover-serial-tests.outputs.tests) }}

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test Serial
        run: |
          if [ "${{ inputs.network }}" = "default" ]; then
            cargo test \
              --release \
              --package ream \
              --bin ream \
              ${{ matrix.test_name }} \
              -- --nocapture
          else
            cargo test \
              --package ream \
              --bin ream \
              ${{ matrix.test_name }} \
              --no-default-features \
              --features "${{ inputs.network }}" \
              -- --nocapture
          fi
