name: Rust

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  merge_group:

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        run: rustup install nightly

      - name: Install rustfmt for nightly
        run: rustup component add --toolchain nightly-x86_64-unknown-linux-gnu rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run rustfmt
        run: cargo +nightly fmt -- --check

      - name: Check `map_err` variable naming
        run: make fmt

  cargo-clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Clippy
        run: |
          cargo clippy --all --all-targets --no-deps -- --deny warnings # clippy for ream, default features
          cargo clippy --package ream-bls --all-targets --features "supranational" --no-deps -- --deny warnings # clippy for ream-bls, supranational feature
          make clippy-devnet3

  cargo-sort:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # Install this commit as there isn't a release yet which works for workspace's
      - name: Install cargo sort
        run: cargo install --git https://github.com/DevinR528/cargo-sort.git --rev 25a60ad860ce7cd0055abf4b69c18285cb07ab41 cargo-sort

      - name: Run cargo sort
        run: cargo sort --grouped --check --workspace

  build:
    runs-on: ubuntu-latest
    needs: [format, cargo-clippy]

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: cargo build --verbose

  discover-serial-tests:
    runs-on: ubuntu-latest
    needs: [format, cargo-clippy]
    outputs:
      tests: ${{ steps.discover.outputs.tests }}
      has_tests: ${{ steps.discover.outputs.has_tests }}

    steps:
      - uses: actions/checkout@v4

      - id: discover
        name: Discover serial tests
        run: |
          set -euo pipefail

          mapfile -t serial_tests < <(.github/scripts/serial-tests.sh)
          if [ "${#serial_tests[@]}" -eq 0 ]; then
            echo 'tests=["__no_serial_tests__"]' >> "$GITHUB_OUTPUT"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tests_json="$(printf '%s\n' "${serial_tests[@]}" | jq -R . | jq -s -c .)"
          echo "tests=${tests_json}" >> "$GITHUB_OUTPUT"
          echo "has_tests=true" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: [format, cargo-clippy]

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test
        run: |
          set -euo pipefail

          mapfile -t serial_tests < <(.github/scripts/serial-tests.sh)
          skip_args=()
          for test_name in "${serial_tests[@]}"; do
            skip_args+=(--skip "$test_name")
          done

          cargo test --release --workspace -- --nocapture "${skip_args[@]}"

  test-serial:
    name: test serial (${{ matrix.test_name }})
    if: ${{ needs.discover-serial-tests.outputs.has_tests == 'true' }}
    runs-on: ubuntu-latest
    needs: [format, cargo-clippy, discover-serial-tests]
    strategy:
      fail-fast: false
      matrix:
        test_name: ${{ fromJson(needs.discover-serial-tests.outputs.tests) }}

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test Serial
        run: |
          cargo test \
            --release \
            --package ream \
            --bin ream \
            ${{ matrix.test_name }} \
            -- --nocapture --test-threads=1

  test-devnet3:
    runs-on: ubuntu-latest
    needs: [format, cargo-clippy]

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test Devnet 3
        run: |
          set -euo pipefail

          mapfile -t serial_tests < <(.github/scripts/serial-tests.sh)
          skip_args=()
          for test_name in "${serial_tests[@]}"; do
            skip_args+=(--skip "$test_name")
          done

          cargo test --workspace --no-default-features --features devnet3 -- --nocapture "${skip_args[@]}"

  test-serial-devnet3:
    name: test serial devnet3 (${{ matrix.test_name }})
    if: ${{ needs.discover-serial-tests.outputs.has_tests == 'true' }}
    runs-on: ubuntu-latest
    needs: [format, cargo-clippy, discover-serial-tests]
    strategy:
      fail-fast: false
      matrix:
        test_name: ${{ fromJson(needs.discover-serial-tests.outputs.tests) }}

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test Serial Devnet 3
        run: |
          cargo test \
            --package ream \
            --bin ream \
            ${{ matrix.test_name }} \
            --no-default-features \
            --features devnet3 \
            -- --nocapture --test-threads=1

  ef-tests:
    runs-on: ubuntu-latest
    needs: [format, cargo-clippy]

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test consensus spec tests
        run: cd testing/ef-tests && make test

  lean-spec-tests:
    runs-on: ubuntu-latest
    needs: [format, cargo-clippy]

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Test lean spec tests
        run: cd testing/lean-spec-tests && make test
