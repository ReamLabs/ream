name: leanSpec

on:
  push:
    branches: ["master"]
    paths:
      - "crates/rpc/lean/**"
      - "crates/common/api_types/lean/**"
      - "crates/common/api_types/common/**"
      - "crates/common/consensus/lean/**"
      - ".github/workflows/lean-api-tests.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "crates/rpc/lean/**"
      - "crates/common/api_types/lean/**"
      - "crates/common/api_types/common/**"
      - "crates/common/consensus/lean/**"
      - ".github/workflows/lean-api-tests.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  api-conformance:
    name: api-spec-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ream
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build ream
        run: cargo build --release --package ream --bin ream --no-default-features --features devnet4

      - name: Checkout leanSpec
        uses: actions/checkout@v4
        with:
          repository: leanEthereum/leanSpec
          path: leanSpec

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install leanSpec dependencies
        working-directory: leanSpec
        run: uv sync

      - name: Generate devnet4 validator registry
        run: |
          ./target/release/ream generate-validator-registry \
            --output ./devnet4-config \
            --number-of-nodes 1 \
            --number-of-validators-per-node 3

      - name: Start ream in background
        run: |
          ./target/release/ream --ephemeral lean_node \
            --network ephemery \
            --validator-registry-path ./devnet4-config/validators.yaml \
            --bootnodes none \
            &
          echo $! > /tmp/ream.pid

      - name: Wait for ream to be ready
        run: |
          echo "Waiting for ream API to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:5052/lean/v0/health | grep -q "healthy"; then
              echo "ream is ready!"
              exit 0
            fi
            echo "Attempt $i: ream not ready yet, waiting..."
            sleep 2
          done
          echo "ream failed to start within 60 seconds"
          exit 1

      - name: Run leanSpec API tests
        working-directory: leanSpec
        run: uv run apitest http://localhost:5052

      - name: Stop ream
        if: always()
        run: |
          if [ -f /tmp/ream.pid ]; then
            kill $(cat /tmp/ream.pid) 2>/dev/null || true
          fi
