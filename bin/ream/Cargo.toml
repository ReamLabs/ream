[package]
name = "ream"
description = "A Rust implementation of the Ethereum Beam Chain specification."
authors.workspace = true
edition.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[[bin]]
name = "ream"
path = "src/main.rs"

[features]
default = ["devnet5"]
devnet5 = [
    "ream-chain-lean/devnet5",
    "ream-consensus-lean/devnet5",
    "ream-fork-choice-lean/devnet5",
    "ream-keystore/devnet5",
    "ream-network-spec/devnet5",
    "ream-p2p/devnet5",
    "ream-rpc-lean/devnet5",
    "ream-storage/devnet5",
    "ream-validator-lean/devnet5",
]
optimized-leanvm = [
    "ream-network-spec/optimized-leanvm",
    "devnet5",
    "ream-chain-beacon/optimized-leanvm",
    "ream-chain-lean/optimized-leanvm",
    "ream-checkpoint-sync-beacon/optimized-leanvm",
    "ream-checkpoint-sync-lean/optimized-leanvm",
    "ream-consensus-lean/optimized-leanvm",
    "ream-fork-choice-beacon/optimized-leanvm",
    "ream-fork-choice-lean/optimized-leanvm",
    "ream-keystore/optimized-leanvm",
    "ream-network-manager/optimized-leanvm",
    "ream-network-state-lean/optimized-leanvm",
    "ream-p2p/optimized-leanvm",
    "ream-post-quantum-crypto/optimized-leanvm",
    "ream-rpc-beacon/optimized-leanvm",
    "ream-rpc-lean/optimized-leanvm",
    "ream-storage/optimized-leanvm",
    "ream-sync-committee-pool/optimized-leanvm",
    "ream-validator-beacon/optimized-leanvm",
    "ream-validator-lean/optimized-leanvm",
]

[dependencies]
alloy-primitives.workspace = true
anyhow.workspace = true
bip39.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
discv5.workspace = true
ethereum_ssz.workspace = true
hashbrown.workspace = true
leansig.workspace = true
libp2p-identity.workspace = true
prometheus_exporter.workspace = true
rand.workspace = true
rand_chacha.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
ssz_types.workspace = true
tikv-jemallocator = { workspace = true, features = [
    "unprefixed_malloc_on_supported_platforms",
] }
tokio.workspace = true
tracing = { workspace = true, features = ["log"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tree_hash.workspace = true
unicode-normalization.workspace = true
url.workspace = true

# ream dependencies
ream-account-manager.workspace = true
ream-api-types-beacon.workspace = true
ream-api-types-common.workspace = true
ream-chain-beacon.workspace = true
ream-chain-lean.workspace = true
ream-checkpoint-sync-beacon.workspace = true
ream-checkpoint-sync-lean.workspace = true
ream-consensus-beacon.workspace = true
ream-consensus-lean.workspace = true
ream-consensus-misc.workspace = true
ream-discv5.workspace = true
ream-events-beacon.workspace = true
ream-execution-engine.workspace = true
ream-executor.workspace = true
ream-fork-choice-beacon.workspace = true
ream-fork-choice-lean.workspace = true
ream-keystore.workspace = true
ream-metrics.workspace = true
ream-network-manager.workspace = true
ream-network-spec.workspace = true
ream-network-state-lean.workspace = true
ream-node.workspace = true
ream-operation-pool.workspace = true
ream-p2p.workspace = true
ream-post-quantum-crypto.workspace = true
ream-rpc-beacon.workspace = true
ream-rpc-common.workspace = true
ream-rpc-lean.workspace = true
ream-storage.workspace = true
ream-sync.workspace = true
ream-sync-committee-pool.workspace = true
ream-validator-beacon.workspace = true
ream-validator-lean.workspace = true

[dev-dependencies]
reqwest.workspace = true
serial_test = "3.4.0"
snap.workspace = true

[lints]
workspace = true
